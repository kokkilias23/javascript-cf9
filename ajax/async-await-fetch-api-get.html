<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch API Async wait</title>
</head>
<body>

    <h1>Fetch API Async/Await GET Example</h1>
    <button id="btn" type="button">Fetch One Post</button>
    <p id="responseText"></p>

    <script>
        document.querySelector('#btn').addEventListener('click', async () => {
            try {
                const response = await fetch('https://jsonplaceholder.typicode.com/posts/1');
                
                if (!response.ok) { // όλα τα 2xx responses
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                document.getElementById('responseText').textContent = `Title: ${data.title} 
                                                                       Body: ${data.body}`;
            } catch (error) {
                document.getElementById('responseText').textContent = `Error: ${error.message}`;
                console.error('Error fetching data:', error.message);
            }
        });
    </script>
    
</body>
</html>
